<header class="barra-superior">
  @if (enlaces.length > 0) {
    <nav class="barra-superior__nav">
      @for (enlace of enlaces; track enlace.ruta) {
        <a
          class="barra-superior__nav-link"
          [routerLink]="enlace.ruta"
          routerLinkActive="barra-superior__nav-link--activo"
        >{{ enlace.label }}</a>
      }
    </nav>
  }

  <div class="barra-superior__buscador-contenedor">
    <div class="barra-superior__buscador">
      <lucide-icon name="search" class="barra-superior__buscador-icono"></lucide-icon>
      <input
        class="barra-superior__buscador-input"
        [placeholder]="buscarPlaceholder"
        type="text"
      />
    </div>
  </div>

  <div class="barra-superior__acciones">
    <div class="barra-superior__herramientas">
      <button class="barra-superior__boton-icono">
        <lucide-icon name="bell"></lucide-icon>
      </button>

      <div class="barra-superior__perfil">
        @if (perfil.avatarUrl) {
          <img [alt]="perfil.nombre || 'Usuario'" [src]="perfil.avatarUrl" class="barra-superior__img-perfil" />
        } @else {
          <lucide-icon name="user" class="barra-superior__icono-perfil"></lucide-icon>
        }
      </div>
    </div>
  </div>
</header>
